name: Deploy Supabase Edge Function

on:
  push:
    branches:
      - main  # 만약 주 브랜치 이름이 master라면 master로 변경하세요
    paths:
      - 'supabase/functions/**'  # 이 폴더 안의 코드가 변경될 때만 실행됨

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3
        
      - name: Supabase CLI 설치
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Supabase 서버로 배포 (Deploy)
        run: supabase functions deploy server --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
